apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-operator
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://charts.external-secrets.io
      chart: external-secrets
      targetRevision: "0.14.0"
      helm:
        valueFiles:
          - $values/argocd-apps/apps/external-secrets-operator/values.yaml
    - repoURL: https://github.com/Liam-E2/k3s-ec2-example
      targetRevision: main
      ref: values
    - repoURL: https://github.com/Liam-E2/k3s-ec2-example
      targetRevision: main
      path: argocd-apps/apps/external-secrets-operator/config
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
