apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: karpenter
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: oci://public.ecr.aws/karpenter
      chart: karpenter
      targetRevision: "1.3.3"
      helm:
        valueFiles:
          - $values/karpenter/values.yaml
    - repoURL: https://github.com/Liam-E2/k3s-ec2-example
      targetRevision: main
      ref: values
    - repoURL: https://github.com/Liam-E2/k3s-ec2-example
      targetRevision: main
      path: argocd-apps/charts/karpenter-config
  destination:
    server: https://kubernetes.default.svc
    namespace: karpenter
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
