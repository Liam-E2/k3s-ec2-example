apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: karpenter-config
  namespace: karpenter
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-ssm
    kind: ClusterSecretStore
  target:
    name: karpenter-config
    creationPolicy: Owner
  data:
    - secretKey: nlbDns
      remoteRef:
        key: "/{{ .Values.clusterName }}/nlb-dns"
    - secretKey: controllerRoleArn
      remoteRef:
        key: "/{{ .Values.clusterName }}/karpenter/controller-role-arn"
    - secretKey: nodeInstanceProfile
      remoteRef:
        key: "/{{ .Values.clusterName }}/karpenter/node-instance-profile"
    - secretKey: interruptionQueue
      remoteRef:
        key: "/{{ .Values.clusterName }}/karpenter/interruption-queue"
    - secretKey: clusterTokenArn
      remoteRef:
        key: "/{{ .Values.clusterName }}/cluster-token-arn"
