apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiFamily: Custom

  amiSelectorTerms:
    - name: "al2023-ami-*-arm64"
      owner: "amazon"

  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: {{ .Values.clusterName | quote }}

  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: {{ .Values.clusterName | quote }}

  instanceProfile: {{ .Values.instanceProfile | quote }}

  userData: |
    #!/bin/bash
    set -euo pipefail

    # === Metadata & environment ===
    IMDS_TOKEN=$(curl -sf -X PUT "http://169.254.169.254/latest/api/token" \
      -H "X-aws-ec2-metadata-token-ttl-seconds:21600")

    REGION=$(curl -sf -H "X-aws-ec2-metadata-token: $IMDS_TOKEN" \
      "http://169.254.169.254/latest/meta-data/placement/region")

    INSTANCE_ID=$(curl -sf -H "X-aws-ec2-metadata-token: $IMDS_TOKEN" \
      "http://169.254.169.254/latest/meta-data/instance-id")

    AZ=$(curl -sf -H "X-aws-ec2-metadata-token: $IMDS_TOKEN" \
      "http://169.254.169.254/latest/meta-data/placement/availability-zone")

    HOSTNAME=$(curl -sf -H "X-aws-ec2-metadata-token: $IMDS_TOKEN" \
      "http://169.254.169.254/latest/meta-data/local-hostname")

    # === Secrets / Tokens ===
    K3S_TOKEN=$(aws secretsmanager get-secret-value \
      --region "$REGION" \
      --secret-id {{ $clusterTokenArn | quote }} \
      --query SecretString --output text)

    # === User-provided environment ===
    K3S_SERVER="https://{{ $nlbDns }}:6443"
    PROVISIONER_NAME="default"
    NODECLASS_NAME="default"

    # === Optional taint for Karpenter adoption ===
    KARPENTER_TAINT="karpenter.sh/unregistered:NoExecute"

    # === Bootstrap k3s agent ===
    curl -sfL https://get.k3s.io | K3S_TOKEN="$K3S_TOKEN" sh -s - agent \
      --server "$K3S_SERVER" \
      --node-name "$HOSTNAME" \
      --node-label "karpenter.k8s.aws/provisioner-name=$PROVISIONER_NAME" \
      --node-label "karpenter.k8s.aws/node-template=$NODECLASS_NAME" \
      --node-taint "$KARPENTER_TAINT" \
      --kubelet-arg "provider-id=aws:///$AZ/$INSTANCE_ID"

  tags:
    karpenter.sh/managed-by: {{ .Values.clusterName | quote }}
