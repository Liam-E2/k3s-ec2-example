apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: default
spec:
  template:
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default

      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["arm64"]
        # General purpose (t4g), compute (c7g), memory (r7g), balanced (m7g) ARM families
        - key: karpenter.k8s.aws/instance-family
          operator: In
          values: ["t4g", "m7g", "c7g", "r7g"]
        # Skip nano/micro — too small for k3s agent + workload overhead
        - key: karpenter.k8s.aws/instance-size
          operator: In
          values: ["small", "medium", "large", "xlarge", "2xlarge"]
        # Prefer spot; fall back to on-demand
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot", "on-demand"]

      # NOTE: no toleration for node-role.kubernetes.io/control-plane here —
      # workloads scheduled by Karpenter must NOT land on control-plane nodes.

  limits:
    cpu: "100"
    memory: "400Gi"

  disruption:
    # Terminate empty nodes quickly (good for ephemeral batch jobs)
    consolidationPolicy: WhenEmpty
    consolidateAfter: 30s
    budgets:
      - nodes: "100%"
